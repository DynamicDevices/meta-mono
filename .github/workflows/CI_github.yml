name: meta-mono

on:
  push:
    branches:
      - kirkstone
    paths-ignore:
      - "**.md"
  pull_request:
    branches:
      - kirkstone
    paths-ignore:
      - "**.md"

# Self-hosted runner is singular; cancel superseded runs.
concurrency:
  group: meta-mono-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    # Honor [skip ci] on push (e.g. documentation merges).
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]'))
    runs-on: [self-hosted, linux, X64]
    timeout-minutes: 480
    container:
      image: dynamicdevices/yocto-ci-build:latest
      options: --privileged --platform linux/amd64  -v /dev/net/tun:/dev/net/tun -v /dev/kvm:/dev/kvm
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        include:
          - {dotnet_version: "8.0.201", mono_version: "6.12.0.161", arch: x86-64}
          - {dotnet_version: "6.0.419", mono_version: "6.12.0.161", arch: x86-64}
          - {dotnet_version: "8.0.201", mono_version: "6.12.0.161", arch: arm64}
          - {dotnet_version: "6.0.419", mono_version: "6.12.0.161", arch: arm64}
    env:
      name: build-and-test
      MONO_VERSION: ${{ matrix.mono_version }}
      DOTNET_VERSION: ${{ matrix.dotnet_version }}
      ARCH: ${{ matrix.arch }}
      BRANCH: kirkstone
    steps:
    - name: Free disk space
      run: |
        echo "=== disk before cleanup ==="
        df -h
        for path in styhead whinlatter wrynose scarthgap nanbield styhead-test feature \
                    "${BRANCH}/build/tmp" "${BRANCH}/build/cache" "${BRANCH}/build/tmp-glibc" \
                    "${BRANCH}/build/deploy"; do
          if [ -e "$path" ]; then
            echo "Removing $path"
            rm -rf "$path"
          fi
        done
        echo "=== disk after cleanup ==="
        df -h
    - name: Checkout meta-mono
      uses: actions/checkout@v6
      with:
        clean: false
        path: ${{ env.BRANCH }}/meta-mono
    - name: Update repo poky
      run: |
        # HTTPS: git.yoctoproject.org is behind Cloudflare; git:// (9418) is unreliable.
        if [ ! -d ${BRANCH}/poky ]; then
          git clone https://git.yoctoproject.org/poky -b ${BRANCH} ${BRANCH}/poky
        else
          cd ${BRANCH}/poky
          git fetch origin ${BRANCH}
          git checkout ${BRANCH}
          git pull origin ${BRANCH}
          cd ../..
        fi
    - name: Update repo meta-openembedded
      run: |
        if [ ! -d ${BRANCH}/meta-openembedded ]; then
          git clone https://github.com/openembedded/meta-openembedded.git -b ${BRANCH} ${BRANCH}/meta-openembedded
        else
          cd ${BRANCH}/meta-openembedded
          git fetch origin ${BRANCH}
          git checkout ${BRANCH}
          git pull origin ${BRANCH}
          cd ../..
        fi
    - name: Configuring
      run: |
        rm -f ${BRANCH}/build/conf/local.conf
        rm -f ${BRANCH}/build/conf/bblayers.conf
        . ./${BRANCH}/poky/oe-init-build-env ${BRANCH}/build

        echo "### Starting to configure local.conf and bblayers.conf ###"
        echo "mono version: $MONO_VERSION"
        echo "dotnet version: $DOTNET_VERSION"

        echo "BBLAYERS += '$GITHUB_WORKSPACE/${BRANCH}/meta-mono'" >> conf/bblayers.conf
        echo "BBLAYERS += '$GITHUB_WORKSPACE/${BRANCH}/meta-openembedded/meta-oe'" >> conf/bblayers.conf

        echo "MACHINE = \"qemu${ARCH}\"" >> conf/local.conf
        echo "DL_DIR = \"$GITHUB_WORKSPACE/downloads\"" >> conf/local.conf
        echo "SSTATE_DIR = \"$GITHUB_WORKSPACE/sstate\"" >> conf/local.conf

        echo "PREFERRED_VERSION_mono = \"${MONO_VERSION}\"" >> conf/local.conf
        echo "PREFERRED_VERSION_mono-native = \"${MONO_VERSION}\"" >> conf/local.conf

        echo "PREFERRED_VERSION_dotnet = \"${DOTNET_VERSION}\"" >> conf/local.conf
        echo "PREFERRED_VERSION_dotnet-native = \"${DOTNET_VERSION}\"" >> conf/local.conf

        echo "INHERIT += \" rm_work \"" >> conf/local.conf
        sed -i 's/#IMAGE_CLASSES += "testimage testsdk"/IMAGE_CLASSES += "testimage "/' conf/local.conf

        if [ "$ARCH" = "arm64" ]; then
          echo "BB_NUMBER_THREADS ?= \"4\"" >> conf/local.conf
          echo "PARALLEL_MAKE ?= \"-j 4\"" >> conf/local.conf
        else
          echo "BB_NUMBER_THREADS ?= \"\${@oe.utils.cpu_count()}\"" >> conf/local.conf
          echo "PARALLEL_MAKE ?= \"-j \${@oe.utils.cpu_count()} -l \${@oe.utils.cpu_count()*2}\"" >> conf/local.conf
        fi
    - name: Building Mono Test Image
      run: |
        . ./${BRANCH}/poky/oe-init-build-env ${BRANCH}/build
        # Disk heartbeat in the background; wait on bitbake so failures
        # surface immediately (a foreground sleep loop delayed exit by 5m).
        bitbake test-image-mono &
        bbpid=$!
        (
          while kill -0 "$bbpid" 2>/dev/null; do
            sleep 300
            echo "=== build heartbeat $(date -u +%H:%M:%S) ==="
            df -h . || true
          done
        ) &
        hb=$!
        set +e
        wait "$bbpid"
        rc=$?
        set -e
        kill "$hb" 2>/dev/null || true
        wait "$hb" 2>/dev/null || true
        exit "$rc"
    - name: Testing
      run: |
        . ./${BRANCH}/poky/oe-init-build-env ${BRANCH}/build
        export TERM=linux
        bitbake test-image-mono -c testimage
    - name: Store artifacts
      uses: actions/upload-artifact@v6
      with:
        name: test-image-mono-${{ env.BRANCH }}-${{ matrix.mono_version }}-${{ matrix.dotnet_version }}-${{ github.sha }}-${{ matrix.arch }}
        path: ./${{ env.BRANCH }}/build/tmp/deploy/images/qemu${{ matrix.arch }}/
